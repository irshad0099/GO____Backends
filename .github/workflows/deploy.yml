name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: 13.200.251.24
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /var/www/gomobility-backend

            git pull origin main

            npm install

            pm2 reload gomobility-api

            echo "✅ Deployment completed"
